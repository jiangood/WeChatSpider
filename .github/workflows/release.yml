name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pyinstaller --quiet

      - name: Download UPX
        shell: pwsh
        run: |
          $upxUrl = "https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip"
          $upxZip = "$env:RUNNER_TEMP\upx.zip"
          $upxDir = "$env:RUNNER_TEMP\upx"
          Invoke-WebRequest -Uri $upxUrl -OutFile $upxZip
          Expand-Archive -Path $upxZip -DestinationPath $upxDir -Force
          $upxExe = "$upxDir\upx-5.0.2-win64\upx.exe"
          Add-Content -Path $env:GITHUB_ENV -Value "UPX_EXE=$upxExe"
          Add-Content -Path $env:GITHUB_ENV -Value "CI_VERSION=${{ github.ref_name }}"

      - name: Debug env
        run: |
          echo "GITHUB_REF_NAME=$env:GITHUB_REF_NAME"
          echo "CI_VERSION=$env:CI_VERSION"
          echo "UPX_EXE=$env:UPX_EXE"
          echo "--- Python test ---"
          python -c "import os; print('CI_VERSION:', os.environ.get('CI_VERSION', 'NOT SET'))"

      - name: Build
        run: python -u script\build_ci.py

      - name: Create ZIP
        run: |
          $zipName = "WeChatSpider_$env:GITHUB_REF_NAME-Portable.zip"
          Compress-Archive -Path "dist\WeChatSpider\*" -DestinationPath $zipName -CompressionLevel Optimal
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

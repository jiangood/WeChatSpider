name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pyinstaller --quiet

      - name: Download UPX
        run: |
          $upxUrl = "https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip"
          $upxZip = "$env:RUNNER_TEMP\upx.zip"
          $upxDir = "$env:RUNNER_TEMP\upx"
          curl -L -o $upxZip $upxUrl
          Expand-Archive -Path $upxZip -DestinationPath $upxDir -Force
          echo "UPX_DIR=$upxDir\upx-5.0.2-win64\upx.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: script\build_ci.bat "${{ github.ref_name }}" "%UPX_DIR%"

      - name: Create ZIP
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "WeChatSpider_${version}_Portable.zip"
          Compress-Archive -Path "dist\WeChatSpider\*" -DestinationPath $zipName -CompressionLevel Optimal
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2019

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pyinstaller --quiet

      - name: Build
        run: pyinstaller --clean --noconfirm WeChatSpider.spec

      - name: Create ZIP
        run: |
          $zipName = "WeChatSpider_$env:GITHUB_REF_NAME-Portable.zip"
          Compress-Archive -Path "dist\WeChatSpider\*" -DestinationPath $zipName -CompressionLevel Optimal
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_NAME=$zipName"

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true

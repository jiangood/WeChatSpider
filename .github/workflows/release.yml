name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pyinstaller --quiet

      - name: Download UPX
        shell: pwsh
        run: |
          $upxUrl = "https://github.com/upx/upx/releases/download/v5.0.2/upx-5.0.2-win64.zip"
          $upxZip = "$env:RUNNER_TEMP\upx.zip"
          $upxDir = "$env:RUNNER_TEMP\upx"
          Invoke-WebRequest -Uri $upxUrl -OutFile $upxZip
          Expand-Archive -Path $upxZip -DestinationPath $upxDir -Force
          $upxExe = "$upxDir\upx-5.0.2-win64\upx.exe"
          echo "UPX_EXE=$upxExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: |
          echo === Build environment ===
          echo Version: "%GITHUB_REF_NAME%"
          echo UPX: "%UPX_EXE%"
          echo Working dir: %CD%
          echo Python: 
          where python
          python --version
          echo === Running build_ci.bat ===
          call script\build_ci.bat "%GITHUB_REF_NAME%"
          echo === Build completed ===

      - name: Create ZIP
        run: |
          $zipName = "WeChatSpider_$env:GITHUB_REF_NAME-Portable.zip"
          Compress-Archive -Path "dist\WeChatSpider\*" -DestinationPath $zipName -CompressionLevel Optimal
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
